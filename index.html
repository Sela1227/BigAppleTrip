.card .emoji{font-size:2.6rem;flex-shrink:0;width:58px;text-align:center}
.card .t{flex:1}
.card .t h2{font-size:1.2rem;font-weight:900;margin-bottom:3px}
.card .t span{font-size:.85rem;opacity:.78;font-weight:700;line-height:1.4;display:block}
.card .arrow{font-size:1.4rem;opacity:.6}
.foot{text-align:center;margin-top:30px;font-size:.78rem;opacity:.55;font-weight:700;line-height:1.6}
